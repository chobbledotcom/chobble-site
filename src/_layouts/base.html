<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="generator" content="Eleventy" />
    <title>{{ meta_title | default: title }}</title>
    <meta name="description" content="{{ meta_description | default: description | escape }}" />
    <script src="/assets/js/theme-init.js"></script>
    <link rel="stylesheet" href="/css/style.css?v=6" />
    <link rel="license" href="https://www.gnu.org/licenses/gpl-3.0.en.html" />
    <link rel="icon" href="/favicon.png" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Chobble",
        "legalName": "Chobble CIC",
        "url": "https://chobble.com",
        "logo": "https://chobble.com/favicon.png",
        "description": "Community Interest Company offering web design, custom software development, and technical consulting for small businesses, charities, and co-operatives.",
        "identifier": {
          "@type": "PropertyValue",
          "propertyID": "Companies House",
          "value": "17050113"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Prestwich",
          "addressRegion": "Greater Manchester",
          "addressCountry": "GB"
        },
        "telephone": "+447441125952",
        "email": "hello@chobble.com",
        "founder": {
          "@type": "Person",
          "name": "Stef",
          "url": "https://chobble.com/about/stef/",
          "sameAs": [
            "https://www.stefn.co.uk",
            "https://www.stefn.co.uk/cv/",
            "https://github.com/chobbledotcom"
          ]
        },
        "sameAs": [
          "https://www.facebook.com/ChobbleDotCom",
          "https://www.youtube.com/@ChobbleDotCom",
          "https://github.com/chobbledotcom",
          "https://uk.trustpilot.com/review/chobble.com",
          "https://maps.app.goo.gl/kNqgHRNaMgPDp7Mo8"
        ],
        "areaServed": {
          "@type": "Place",
          "name": "Greater Manchester"
        },
        "knowsAbout": [
          "Web Design",
          "Web Development",
          "Eleventy",
          "Ruby on Rails",
          "WordPress",
          "SEO",
          "Linux",
          "Custom Software Development"
        ],
        "nonprofitStatus": "CommunityInterestCompany"
      }
    </script>
    <script src="https://unpkg.com/@botpoison/browser" async></script>
    <script src="/assets/js/goatcounter-init.js"></script>
    <script data-goatcounter="https://analytics.chobble.com/count"
      async src="https://analytics.chobble.com/count.js"></script>
    <script type="module" async src="/assets/instantpage.js"></script>
    <script src="/assets/js/decrypt-emails.js" data-decrypt-key="{{ encryptKey }}" defer></script>
    <script src="/assets/js/theme-toggle.js" defer></script>
  </head>
  <body class="{{ page.fileSlug }}">
    <header>
      <div class="container">{% include "navbar.html" %}</div>
    </header>

    <main>
      <div class="container">
        {{ content }}
        {% include "contact-form.html" %}
        {% if faqs.size > 0 %}
        <section id="faqs">
          <h2>Frequently asked questions</h2>
          <script type="application/ld+json">
          {
            "@context": "https://schema.org",
            "@type": "FAQPage",
            "mainEntity": [
              {% for faq in faqs %}{
                "@type": "Question",
                "name": {{ faq.q | json }},
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": {{ faq.a | json }}
                }
              }{% unless forloop.last %},{% endunless %}{% endfor %}
            ]
          }
          </script>
          {% for faq in faqs %}
          <details>
            <summary><strong>{{ faq.q }}</strong></summary>
            {% renderTemplate "liquid,md", faq %}
{{ a }}
            {% endrenderTemplate %}
          </details>
          {% endfor %}
        </section>
        {% endif %}
      </div>
    </main>

    <footer>
      <div class="container">{% include "footer.html" %}</div>
    </footer>
  </body>
</html>
